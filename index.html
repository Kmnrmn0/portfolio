<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Jost',sans-serif;background:#F8F6F1;color:#1A2B45;overflow-x:hidden}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:#F8F6F1}
  ::-webkit-scrollbar-thumb{background:#B8892A;border-radius:10px}
  [contenteditable]{outline:none;transition:background .2s,box-shadow .2s}
  [contenteditable].edit-active:hover{background:rgba(184,137,42,.08);box-shadow:0 0 0 1.5px rgba(184,137,42,.4);border-radius:4px;cursor:text}
  [contenteditable].edit-active:focus{background:rgba(184,137,42,.06);box-shadow:0 0 0 2px #B8892A;border-radius:4px}
  .fade-in{animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .lightbox-overlay{position:fixed;inset:0;background:rgba(10,16,28,.92);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .lightbox-img{max-width:88vw;max-height:86vh;object-fit:contain;border:1px solid rgba(255,255,255,.12);border-radius:4px}
  .skill-bar-fill{transition:width 1.2s cubic-bezier(.4,0,.2,1)}
  .bento-card{transition:transform .25s,box-shadow .25s}
  .bento-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(26,43,69,.12)}
  .project-img-wrap{overflow:hidden}
  .project-img-wrap img{transition:transform .5s ease}
  .project-img-wrap:hover img{transform:scale(1.05)}
  .toolbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(248,246,241,.95);backdrop-filter:blur(20px);border-bottom:1px solid #E8E2D8;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:none;transition:all .2s}
  .btn-gold{background:#B8892A;color:#fff}
  .btn-gold:hover{background:#9A721F}
  .btn-navy{background:#1A2B45;color:#fff}
  .btn-navy:hover{background:#243652}
  .btn-outline{background:transparent;color:#1A2B45;border:1.5px solid #DDD8CE}
  .btn-outline:hover{border-color:#B8892A;color:#B8892A}
  .btn-danger{background:#DC2626;color:#fff}
  .btn-danger:hover{background:#B91C1C}
  .edit-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
  .edit-on{background:rgba(184,137,42,.15);color:#B8892A;border:1px solid rgba(184,137,42,.3)}
  .edit-off{background:rgba(26,43,69,.08);color:#7A7060;border:1px solid #E8E2D8}
  .img-upload-zone{border:2px dashed #DDD8CE;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
  .img-upload-zone:hover{border-color:#B8892A;background:rgba(184,137,42,.04)}
  .section-nav-dot{width:8px;height:8px;border-radius:50%;background:#DDD8CE;cursor:pointer;transition:background .2s,transform .2s}
  .section-nav-dot.active{background:#B8892A;transform:scale(1.3)}
</style>

// ── Editable Text ────────────────────────────────────────────
function Editable({ tag: Tag = "span", value, onChange, editMode, className = "", style = {} }) {
  const ref = useRef();
  useEffect(() => {
    if (ref.current && ref.current.innerText !== value) ref.current.innerText = value;
  }, [value]);
  return (
    <Tag
      ref={ref}
      contentEditable={editMode}
      suppressContentEditableWarning
      className={`${className} ${editMode ? "edit-active" : ""}`}
      style={style}
      onBlur={e => editMode && onChange && onChange(e.target.innerText)}
    />
  );
}

// ── Image Upload Button ──────────────────────────────────────
function ImgUploadBtn({ onUpload, editMode, label = "Changer" }) {
  const inputRef = useRef();
  if (!editMode) return null;
  return (
    <>
      <button className="btn btn-outline" style={{fontSize:"11px",padding:"5px 10px"}}
        onClick={() => inputRef.current.click()}>
        <Icon.Camera/> {label}
      </button>
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}}
        onChange={e => {
          const file = e.target.files[0]; if (!file) return;
          const reader = new FileReader();
          reader.onload = ev => onUpload(ev.target.result);
          reader.readAsDataURL(file);
          e.target.value = "";
        }}/>
    </>
  );
}

// ── Skill Bar ───────────────────────────────────────────────
function SkillBar({ name, level, pct, editMode, onNameChange, onLevelChange }) {
  return (
    <div style={{marginBottom:"14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
        <Editable tag="span" value={name} onChange={onNameChange} editMode={editMode}

        <Editable tag="span" value={level || `${pct}%`} onChange={onLevelChange} editMode={editMode}
          style={{fontSize:"11px",color:"#B8892A",fontWeight:600}}/>
      </div>
      <div style={{height:"3px",background:"#E8E2D8",borderRadius:"2px"}}>
        <div className="skill-bar-fill" style={{height:"100%",width:`${pct}%`,borderRadius:"2px",background:"linear-gradient(to right,#1A2B45,#3B6E8F)"}}/>
      </div>
    </div>
  );
}

// ── Lightbox ─────────────────────────────────────────────────
function Lightbox({ src, caption, onClose }) {
  useEffect(() => {
    const fn = e => { if(e.key === "Escape") onClose(); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, []);
  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <button style={{position:"absolute",top:24,right:32,background:"none",border:"none",color:"rgba(255,255,255,.8)",cursor:"pointer",fontSize:"28px"}} onClick={onClose}><Icon.X/></button>
      <img className="lightbox-img" src={src} alt={caption} onClick={e => e.stopPropagation()}/>
      {caption && <div style={{position:"absolute",bottom:28,left:"50%",transform:"translateX(-50%)",fontSize:"13px",color:"rgba(255,255,255,.6)",letterSpacing:".06em",whiteSpace:"nowrap"}}>{caption}</div>}
    </div>
  );
}

    if (!editMode) return;
    setData(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const keys = path.split(".");
      let obj = next;
      for(let i = 0; i < keys.length - 1; i++) {
        const k = keys[i];
        const idx = parseInt(k);
        obj = isNaN(idx) ? obj[k] : obj[idx];
      }
      const last = keys[keys.length - 1];
      const idx = parseInt(last);
      if(isNaN(idx)) obj[last] = value;
      else obj[idx] = value;
      return next;
    });
  }, [editMode]);

              <div key={exp.id} style={{position:"relative",marginBottom:"48px"}}>
                <div style={{position:"absolute",left:-30,top:6,width:14,height:14,borderRadius:"50%",border:`2px solid ${exp.active?"#B8892A":"#243652"}`,background:exp.active?"#B8892A":"#fff"}}/>
                <div className="bento-card" style={{background:"#fff",border:`1px solid ${exp.active?"rgba(184,137,42,.5)":"#E8E2D8"}`,padding:"28px 32px",boxShadow:"0 2px 12px rgba(26,43,69,.07)",borderLeft:exp.active?"3px solid #B8892A":"1px solid #E8E2D8"}}>
                  <Editable tag="div" value={exp.date} onChange={v=>update(`experiences.${ei}.date`,v)} editMode={editMode}
                    style={{fontSize:"10px",letterSpacing:".2em",textTransform:"uppercase",color:"#B8892A",fontWeight:600,marginBottom:"6px"}}/>
                  <Editable tag="div" value={exp.role} onChange={v=>update(`experiences.${ei}.role`,v)} editMode={editMode}
                    style={{fontFamily:"'Playfair Display',serif",fontSize:"19px",fontWeight:600,marginBottom:"4px"}}/>
                  <Editable tag="div" value={exp.org} onChange={v=>update(`experiences.${ei}.org`,v)} editMode={editMode}
                    style={{fontSize:"12.5px",color:"#6A9AB5",fontWeight:500,marginBottom:"16px"}}/>
                  <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:"7px"}}>
                    {exp.bullets.map((b,bi)=>(
                      <li key={bi} style={{fontSize:"13px",color:"#7A7060",paddingLeft:"16px",position:"relative",lineHeight:1.55}}>
                        <span style={{position:"absolute",left:0,top:"8px",width:5,height:1,background:"#6A9AB5",display:"inline-block"}}/>
                        <Editable tag="span" value={b} onChange={v=>update(`experiences.${ei}.bullets.${bi}`,v)} editMode={editMode}/>
                      </li>
                    ))}
                  </ul>
                  {/* Gallery */}
                  {exp.gallery && exp.gallery.length > 0 && (
                    <div style={{marginTop:"24px",paddingTop:"20px",borderTop:"1px solid #E8E2D8"}}>
                      <div style={{fontSize:"9.5px",fontWeight:600,letterSpacing:".22em",textTransform:"uppercase",color:"#B8892A",marginBottom:"16px"}}>Illustrations de réalisations</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
                        {exp.gallery.map((img, gi) => (
                          <div key={gi} className="bento-card" style={{border:"1px solid #E8E2D8",overflow:"hidden",boxShadow:"0 2px 12px rgba(26,43,69,.07)"}}>
                            <div className="project-img-wrap" style={{cursor:"pointer",height:"180px"}}
                              onClick={() => setLightbox({src:img.src, caption:img.title})}>
                              <img src={img.src} alt={img.title} style={{width:"100%",height:"180px",objectFit:"cover",display:"block"}}/>
                            </div>
                            <div style={{padding:"12px 16px",background:"#fff",borderTop:"3px solid #B8892A"}}>
                              <Editable tag="div" value={img.tag} onChange={v=>update(`experiences.${ei}.gallery.${gi}.tag`,v)} editMode={editMode}
                                style={{fontSize:"9px",letterSpacing:".2em",textTransform:"uppercase",color:"#B8892A",fontWeight:600,marginBottom:"4px"}}/>
                              <Editable tag="div" value={img.title} onChange={v=>update(`experiences.${ei}.gallery.${gi}.title`,v)} editMode={editMode}
                                style={{fontSize:"13px",fontWeight:500,color:"#1A2B45"}}/>
                              <Editable tag="div" value={img.sub} onChange={v=>update(`experiences.${ei}.gallery.${gi}.sub`,v)} editMode={editMode}
                                style={{fontSize:"11px",color:"#7A7060",marginTop:"2px"}}/>
                              {editMode && (
                                <div style={{marginTop:"8px"}}>
                                  <ImgUploadBtn editMode={editMode} label="Remplacer image"
                                    onUpload={src=>update(`experiences.${ei}.gallery.${gi}.src`,src)}/>
                                </div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── EDUCATION ── */}
      <section style={{padding:"96px 64px",background:"#fff"}} id="education">
        <div style={{maxWidth:"1200px",margin:"0 auto"}}>
          <div style={{marginBottom:"52px"}}>
            <div style={{fontSize:"10px",letterSpacing:".3em",textTransform:"uppercase",color:"#B8892A",marginBottom:"10px"}}>Formation académique</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(28px,4vw,44px)",fontWeight:600}}>
              Études & <em style={{fontStyle:"italic",color:"#3B6E8F"}}>Diplômes</em>
            </h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"20px"}}>
            {data.education.map((edu,i)=>(
              <div key={edu.id} className="bento-card"
                style={{background:edu.featured?"#1A2B45":"#F8F6F1",border:`1px solid ${edu.featured?"#1A2B45":"#E8E2D8"}`,padding:"32px 28px",position:"relative",overflow:"hidden",boxShadow:"0 2px 12px rgba(26,43,69,.07)"}}>
                <div style={{position:"absolute",bottom:-8,right:14,fontFamily:"'Playfair Display',serif",fontSize:"72px",fontWeight:700,color:edu.featured?"rgba(255,255,255,.05)":"rgba(0,0,0,.04)",lineHeight:1,pointerEvents:"none",userSelect:"none"}}>{edu.badge}</div>
                <Editable tag="div" value={edu.year} onChange={v=>update(`education.${i}.year`,v)} editMode={editMode}
                  style={{fontSize:"10px",letterSpacing:".18em",textTransform:"uppercase",color:"#B8892A",marginBottom:"14px",fontWeight:600}}/>
                <Editable tag="div" value={edu.degree} onChange={v=>update(`education.${i}.degree`,v)} editMode={editMode}
                  style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:600,marginBottom:"8px",lineHeight:1.3,color:edu.featured?"#fff":"#1A2B45"}}/>
                <Editable tag="div" value={edu.school} onChange={v=>update(`education.${i}.school`,v)} editMode={editMode}
                  style={{fontSize:"12px",color:edu.featured?"rgba(255,255,255,.6)":"#6A9AB5",marginBottom:"14px",lineHeight:1.4}}/>
                <div style={{display:"inline-flex",padding:"4px 12px",fontSize:"10.5px",letterSpacing:".08em",background:"rgba(184,137,42,.12)",borderLeft:"2px solid #B8892A",color:"#B8892A"}}>
                  <Editable tag="span" value={edu.tag} onChange={v=>update(`education.${i}.tag`,v)} editMode={editMode}/>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── INTERESTS ── */}
      <section style={{padding:"96px 64px",background:"#F8F6F1"}} id="interests">
        <div style={{maxWidth:"1200px",margin:"0 auto"}}>
          <div style={{marginBottom:"52px"}}>
            <div style={{fontSize:"10px",letterSpacing:".3em",textTransform:"uppercase",color:"#B8892A",marginBottom:"10px"}}>Centres d'intérêt</div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(28px,4vw,44px)",fontWeight:600}}>
              Divers & <em style={{fontStyle:"italic",color:"#3B6E8F"}}>Loisirs</em>
            </h2>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"14px"}}>
            {data.interests.map((item,i)=>(
              <div key={i} className="bento-card" style={{background:"#fff",border:"1px solid #E8E2D8",padding:"24px 18px",textAlign:"center",boxShadow:"0 2px 12px rgba(26,43,69,.07)"}}>
                <div style={{fontSize:"28px",marginBottom:"10px"}}>{item.icon}</div>
                <Editable tag="div" value={item.label} onChange={v=>update(`interests.${i}.label`,v)} editMode={editMode}
                  style={{fontSize:"12px",fontWeight:500,color:"#1A2B45"}}/>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ── CONTACT ── */}
      <section style={{padding:"96px 64px",background:"#1A2B45",position:"relative",overflow:"hidden"}} id="contact">
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse 70% 80% at 30% 50%,rgba(59,110,143,.15),transparent),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(184,137,42,.08),transparent)",pointerEvents:"none"}}/>
        <div style={{maxWidth:"900px",margin:"0 auto",textAlign:"center",position:"relative",zIndex:1}}>
          <div style={{fontSize:"10px",letterSpacing:".3em",textTransform:"uppercase",color:"#D4A84B",marginBottom:"12px",display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}>Contact</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(32px,5vw,56px)",fontWeight:600,color:"#fff",marginBottom:"20px",lineHeight:1.1}}>
            Construisons quelque<br/><em style={{fontStyle:"italic",color:"#D4A84B"}}>chose ensemble</em>
          </h2>
          <Editable tag="p" value={data.description.split(".")[0] + "."} onChange={()=>{}} editMode={false}
            style={{fontSize:"14px",color:"rgba(255,255,255,.6)",maxWidth:"520px",margin:"0 auto 48px",lineHeight:1.75}}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"16px",marginBottom:"48px"}}>
            {[{icon:"✉",label:"Email",key:"email"},{icon:"☎",label:"Téléphone",key:"phone"},{icon:"📍",label:"Adresse",key:"address"}].map(({icon,label,key})=>(
              <div key={key} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",padding:"24px 20px",borderRadius:"2px",transition:"all .3s"}}>
                <div style={{fontSize:"22px",marginBottom:"10px"}}>{icon}</div>
                <div style={{fontSize:"9.5px",letterSpacing:".2em",textTransform:"uppercase",color:"#D4A84B",marginBottom:"6px",fontWeight:600}}>{label}</div>
                <Editable tag="div" value={data[key]} onChange={v=>update(key,v)} editMode={editMode}
                  style={{fontSize:"13px",color:"rgba(255,255,255,.85)",wordBreak:"break-all"}}/>
              </div>
            ))}
          </div>
          <div style={{width:1,height:32,background:"rgba(255,255,255,.15)",margin:"0 auto 18px"}}/>
          <Editable tag="div" value={`© 2024 — ${data.name} ${data.nameSub} · Ingénieur BTP & Génie Civil`} onChange={()=>{}} editMode={false}
            style={{fontSize:"11px",letterSpacing:".12em",color:"rgba(255,255,255,.3)"}}/>
        </div>
      </section>

      {/* ── LIGHTBOX ── */}
      {lightbox && <Lightbox src={lightbox.src} caption={lightbox.caption} onClose={()=>setLightbox(null)}/>}

    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
